owershell -NoProfile -Command \"Get-ChildItem 'HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\GameDVR' -ErrorAction SilentlyContinue | ForEach-Object { Write-Host '---'; Write-Host $_.PSPath; Get-ItemProperty $_.PSPath }\")", "Bash(powershell -NoProfile -Command \"Get-ChildItem 'HKLM:\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Settings' -ErrorAction SilentlyContinue -Recurse | Where-Object { $_.Name -match 'gaming|latency|延迟|game' } | ForEach-Object { Write-Host $_.PSPath }\" 2>&1)", "Bash(powershell -NoProfile -Command \"Get-ChildItem 'HKCU:\\Software\\Microsoft\\GameBar' -ErrorAction SilentlyContinue | ForEach-Object { Write-Host \\$_.PSPath; Get-ItemProperty \\$_.PSPath | Format-List }\")", "Bash(powershell -NoProfile -Command \"Get-ChildItem 'HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\GameDVR' -ErrorAction SilentlyContinue | ForEach-Object { Write-Host \\$_.PSPath; Get-ItemProperty \\$_.PSPath | Format-List }\")", "Bash(powershell -NoProfile -Command \"Get-ChildItem 'HKLM:\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion' -ErrorAction SilentlyContinue | Where-Object { \\$_.PSChildName -match 'Game|Display|Gaming' } | ForEach-Object { Write-Host \\$_.PSPath }\")", "Bash(powershell -NoProfile -Command \"Get-ChildItem 'HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion' -ErrorAction SilentlyContinue | Where-Object { \\$_.PSChildName -match 'Game|Display|Gaming' } | ForEach-Object { Write-Host \\$_.PSPath }\")", "Bash(powershell -NoProfile -Command \"Get-ItemProperty 'HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\GamingConfiguration' -ErrorAction SilentlyContinue | Format-List\")", "Bash(powershell -NoProfile -Command \"Get-ItemProperty 'HKCU:\\Software\\Microsoft\\DirectX' -ErrorAction SilentlyContinue | Format-List\")", "Bash(reg query HKCU\\Software\\Microsoft\\DirectX /s 2>nul)", "Bash(reg query HKCU\\System\\GameConfigStore /s 2>nul)", "Bash(cmd /c \"reg query HKCU\\Software\\Microsoft\\DirectX /s 2>nul\")", "Bash(cmd /c \"reg query HKCU\\System\\GameConfigStore /s 2>nul\")", "Bash(cmd /c \"reg query HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\GamingConfiguration /s 2>nul\")", "Bash(cmd /c \"reg query HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\GameDVR /s 2>nul\")", "Bash(powershell -NoProfile -Command \"Get-ChildItem 'HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\GameDVR' -ErrorAction SilentlyContinue -Recurse | ForEach-Object { Write-Host ('Path: ' + $_.PSPath); Get-ItemProperty $_.PSPath | Format-List }\")", "Edit", "Bash(cd /c/Users/VG622/Documents/PiliPlus_Mod && git status)", "Bash(cd /c/Users/VG622/Documents/PiliPlus_Mod && git diff --stat)", "Bash(cd /c/Users/VG622/Documents/PiliPlus_Mod && git diff -- AGENTS.md reasonix.toml)", "Bash(cd /c/Users/VG622/Documents/PiliPlus_Mod && git diff -- lib/)", "Bash(cd /c/Users/VG622/Documents/PiliPlus_Mod && git add -A && git commit -m \"feat(reply): 视频评论回复预览 & Reasonix 规则补充\n\n- lib/grpc/reply.dart: detailList 增加 pageSize 参数传给 FeedPagination\n- lib/pages/video/reply/controller: 实现 ensureReplyPreview 预加载子回复\n- lib/pages/video/reply/view: 列表项回调触发预览加载\n- AGENTS.md: 补充 Reasonix CLI 与 Codex 子智能体的区分规则，禁止 todo_write\n- reasonix.toml: 从工具列表移除 todo_write，扩展 allow 规则\")", "Bash(cd /c/Users/VG622/Documents/PiliPlus_Mod && git push upstream main)", "Bash(cd /c/Users/VG622/Documents/PiliPlus_Mod && git remote -v)", "Bash(cd /c/Users/VG622/Documents/PiliPlus_Mod && git remote add origin https://github.com/gzy622/PiliPlus && git remote set-url --push upstream \"PUSH_DISABLED\" && git remote -v)", "Bash(cd /c/Users/VG622/Documents/PiliPlus_Mod && git push -u origin main)"]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit)
# may only write under workspace_root (empty = current dir) + allow_write.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
workspace_root = "."
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

# External MCP servers. type: "stdio" (default, a subprocess) | "http" | "sse".
# ${VAR} / ${VAR:-default} are expanded from the environment in command/args/env/url/headers.
[[plugins]]
name    = "headroom"
command = "headroom"
args    = ["mcp", "serve"]

